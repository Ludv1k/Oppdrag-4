{% extends 'base.html'%}

{% block nav_title %}
Login
{% endblock %}

{% block sign_log_btn %}
<button onclick="location.href='/signup'"><h3>Sign up</h3></button>
{% endblock %}

{% block body %}
<h1 class="signup">Log in!</h1>
<form action="/login" method="POST" class="signup">
    <div class="signup_content">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required class="signup_field">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required class="signup_field">
        <br><br>
        <button type="submit" class="signup_submit">Log in</button>
    </div>
</form>
<div class="signup_login_redirect">
    <a href="/signup">Don't have an account? Sign up here.</a>
</div>
{% endblock %}
