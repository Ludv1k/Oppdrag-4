{% extends 'base.html'%}

{% block nav_title %}
Sign up
{% endblock %}

{% block body %}
<h1 class="signup">Make a new user!</h1>
<form method="post" action="/submit" class="signup">
    <div class="signup_content">
        <div>
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" required class="signup_field">
        </div>
        <div>
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" required class="signup_field">
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required class="signup_field">
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="text" id="password" name="password" required class="signup_field">
        </div>
        
        <input type="submit" value="Sign up" class="signup_submit"></input>
    </div>
</form>
<div class="signup_login_redirect">
    <a href="/login">If you already have a user, then Log in.</a>
</div>
{% endblock %}
